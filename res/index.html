<!-- AISee mini console: single file, no frameworks, works served at / or opened from disk. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AISee</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="%2376b900"/><circle cx="8" cy="8" r="3" fill="%23222"/></svg>'>
<style>
  body { font: 14px/1.45 system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { font-size: 1.3rem; } h1 small { color: #888; font-weight: normal; font-size: .8rem; }
  label { display: block; margin: .45rem 0 .1rem; color: #444; font-size: .85rem; }
  input[type=text], input[type=number], textarea, select { width: 100%; box-sizing: border-box; padding: .35rem .5rem; border: 1px solid #ccc; font: inherit; }
  textarea { min-height: 3.2em; resize: vertical; }
  .row { display: flex; gap: .8rem; } .row > div { flex: 1; }
  button { padding: .45rem 1.1rem; font: inherit; cursor: pointer; border: 1px solid #888; background: #f5f5f5; }
  button:hover { background: #eee; } button:disabled { opacity: .5; cursor: default; }
  .muted { color: #999; font-size: .8rem; }
  a { color: #369; }
  /* tabs + frame */
  nav { display: flex; gap: 0; margin-bottom: -1px; }
  nav button { border: 1px solid #ccc; border-bottom: 1px solid #ccc; background: #f0f0f0; color: #666;
               padding: .4rem 1rem; margin-right: .25rem; position: relative; }
  nav button.on { background: #fff; color: #111; border-bottom: 1px solid #fff; z-index: 2; }
  #frame { border: 1px solid #ccc; background: #fff; padding: 1rem 1.2rem; min-height: 14rem; }
  .tab { display: none; } .tab.on { display: block; }
  #status { color: #666; margin: .6rem 0 0; min-height: 1.3em; white-space: pre-wrap; }
  table { border-collapse: collapse; width: 100%; margin-top: .4rem; font-size: .85rem; }
  th, td { border: 1px solid #e0e0e0; padding: .25rem .5rem; text-align: left; }
  th { background: #f5f5f5; color: #555; font-weight: 600; }
  .st-running, .st-done { color: #2a7; }
  .st-starting, .st-queued, .st-preparing_media, .st-model_loading { color: #b80; }
  .st-failed, .st-canceled { color: #c33; }
  #tasksBox tr[data-id] { cursor: pointer; }
  #tasksBox tr.sel td { background: #eef4ff; }
  tr.detail > td { background: #fafafa; padding: .6rem .8rem; cursor: default; }
  .d-status { color: #666; white-space: pre-wrap; margin-bottom: .4rem; }
  .d-result { background: #fff; border: 1px solid #e4e4e4; padding: .5rem .7rem; white-space: pre-wrap;
              word-break: break-word; font-family: ui-monospace, monospace; font-size: .8rem; }
  .d-result.pass { border-left: 4px solid #4a4; } .d-result.fail { border-left: 4px solid #c33; }
  .bar { background: #eee; border: 1px solid #ddd; height: .9rem; position: relative; min-width: 90px; }
  .bar > div { background: #76b900; height: 100%; }
  td button { padding: .1rem .5rem; font-size: .75rem; margin-right: .25rem; }
  .bar span { position: absolute; inset: 0; font-size: .7rem; text-align: center; line-height: .9rem; color: #333; white-space: nowrap; overflow: hidden; }
</style>
</head>
<body>
<h1>AISee <span id="ver" style="font-weight:normal;color:#999"></span></h1>

<nav>
  <button data-tab="server">Server</button>
  <button data-tab="query">Query</button>
  <button data-tab="tasks">Tasks</button>
  <button data-tab="stat">Models</button>
  <button data-tab="gpu">GPU</button>
</nav>
<div id="frame">

<div class="tab" id="tab-query">
  <div class="row">
    <div>
      <label for="kind">kind</label>
      <select id="kind">
        <option value="look">look - free-form question</option>
        <option value="assert">assert - pass/fail expectation</option>
        <option value="watch">watch - whole video, chunked</option>
      </select>
    </div>
    <div><label for="model">model</label><select id="model"><option value="">(default)</option></select></div>
  </div>
  <label for="files">media (images, or a video)</label>
  <input type="file" id="files" multiple accept="image/*,video/*">
  <label for="prompt" id="promptLabel">question</label>
  <textarea id="prompt" placeholder="What is shown on the screen?"></textarea>
  <label for="context">context <span class="muted">(optional background the model should assume)</span></label>
  <textarea id="context" style="min-height:2.2em"></textarea>
  <div class="row">
    <div><label for="fps">fps</label><input type="number" id="fps" step="0.5" min="0" placeholder="auto"></div>
    <div><label for="frames">frames</label><input type="number" id="frames" min="1" placeholder="auto"></div>
    <div><label for="chunk">chunk s (watch)</label><input type="number" id="chunk" min="1" placeholder="auto"></div>
    <div><label for="native" style="margin-bottom:.35rem">native video</label><input type="checkbox" id="native"></div>
  </div>
  <p style="margin-bottom:0"><button id="go">Run</button></p>
  <div id="status"></div>
</div>

<div class="tab" id="tab-tasks">
  <div class="muted" style="margin-bottom:.3rem">click a task to expand its progress / result below it; state survives reloads</div>
  <div id="tasksBox" class="muted">-</div>
</div>

<div class="tab" id="tab-stat">
  <div id="apiInfo" class="muted">-</div>
  <div id="modelsBox"></div>
  <label for="installSel" style="margin-top:.7rem">install a model</label>
  <div class="row">
    <div><select id="installSel"><option value="">(loading catalog...)</option></select></div>
    <div><input type="text" id="installCustom" placeholder="or an HF id: org/Model-Name"></div>
    <div style="flex:0"><button id="installBtn">Install</button></div>
  </div>
  <div id="modelsMsg" class="muted" style="margin-top:.4rem"></div>
  <p style="margin:.6rem 0 0"><button id="refresh">Refresh</button></p>
</div>

<div class="tab" id="tab-gpu">
  <div id="gpuBox" class="muted">-</div>
</div>

<div class="tab" id="tab-server">
  <label for="server">API base URL</label><input type="text" id="server">
  <div class="row">
    <div><label for="token">consumer token (queries; if auth is enabled)</label><input type="text" id="token" placeholder="optional"></div>
    <div><label for="adminToken">admin token (model management)</label><input type="text" id="adminToken" placeholder="optional"></div>
  </div>
  <div id="health" class="muted" style="margin-top:.5rem">not connected</div>
</div>

</div>

<p class="muted">Single-file console for the <a href="https://github.com/myurasov/AISee">AISee</a> REST API.
When opened from disk, point the base URL at your server (CORS is enabled).
Agent-oriented API docs: <span id="descLink">/v1/describe</span>.</p>

<script>
"use strict";
const $ = id => document.getElementById(id);
const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
// 05-Jul-26 20:16:44
function fmtDate(epoch) {
  const d = new Date(epoch * 1000), p = n => String(n).padStart(2, "0");
  return p(d.getDate()) + "-" + MONTHS[d.getMonth()] + "-" + p(d.getFullYear() % 100) + " " +
         p(d.getHours()) + ":" + p(d.getMinutes()) + ":" + p(d.getSeconds());
}
const TERMINAL = ["done", "failed", "canceled"];
const pollers = {};           // task id -> interval handle
let expandedId = localStorage.getItem("aisee.expanded") || null;

// ---------------- tabs ----------------

function showTab(name) {
  for (const b of document.querySelectorAll("nav button"))
    b.className = b.dataset.tab === name ? "on" : "";
  for (const s of document.querySelectorAll(".tab"))
    s.className = s.id === "tab-" + name ? "tab on" : "tab";
  localStorage.setItem("aisee.tab", name);
  if (name === "tasks") refreshTasks(true);
  if (name === "stat") connect();
  if (gpuTimer) { clearInterval(gpuTimer); gpuTimer = null; }
  if (name === "gpu") { refreshGpu(); gpuTimer = setInterval(refreshGpu, 2000); }
}
for (const b of document.querySelectorAll("nav button"))
  b.addEventListener("click", () => showTab(b.dataset.tab));

// ---------------- gpu tab ----------------

let gpuTimer = null;

function bar(pct, label) {
  if (pct === null || isNaN(pct)) return "-";
  const p = Math.min(100, Math.round(pct));
  return '<div class="bar"><div style="width:' + p + '%"></div><span>' + label + "</span></div>";
}

async function refreshGpu() {
  try {
    const g = await api("/v1/gpu");
    const rows = g.gpus.map(x => {
      const memPct = x.memory_total_mib ? 100 * x.memory_used_mib / x.memory_total_mib : null;
      const powPct = x.power_limit_w ? 100 * x.power_draw_w / x.power_limit_w : null;
      return "<tr><td>" + x.name + "</td>" +
        "<td>" + bar(x.utilization_pct, (x.utilization_pct === null ? "-" : x.utilization_pct + "%")) + "</td>" +
        "<td" + (x.memory_source === "system-unified" ? ' title="system unified memory (from /proc/meminfo)"' : "") + ">" +
        (x.memory_total_mib
            ? bar(memPct, Math.round(x.memory_used_mib / 1024) + " / " + Math.round(x.memory_total_mib / 1024) + " GiB" +
                  (x.memory_source === "system-unified" ? "*" : ""))
            : (x.memory_used_mib !== null ? Math.round(x.memory_used_mib / 1024) + " GiB used" : "-")) + "</td>" +
        "<td>" + (x.power_draw_w !== null
            ? (x.power_limit_w ? bar(powPct, Math.round(x.power_draw_w) + " / " + Math.round(x.power_limit_w) + " W")
                               : Math.round(x.power_draw_w) + " W")
            : "-") + "</td>" +
        "<td>" + (x.temperature_c !== null ? x.temperature_c + " C" : "-") + "</td>" +
        "<td>" + (x.clock_sm_mhz !== null ? x.clock_sm_mhz + (x.clock_sm_max_mhz ? " / " + x.clock_sm_max_mhz : "") + " MHz" : "-") + "</td></tr>";
    }).join("");
    $("gpuBox").innerHTML =
      "<table><tr><th>gpu</th><th>utilization</th><th>memory</th><th>power</th><th>temp</th><th>sm clock</th></tr>" +
      rows + "</table><div class='muted' style='margin-top:.3rem'>refreshes every 2 s while this tab is open" + (g.gpus.some(x => x.memory_source === 'system-unified') ? "; * unified memory (system RAM)" : "") + "</div>";
  } catch (e) { $("gpuBox").textContent = "gpu stats: " + e.message; }
}

// ---------------- server / api ----------------

$("server").value = localStorage.getItem("aisee.server") ||
  (location.protocol.startsWith("http") ? location.origin : "http://localhost:8484");
$("token").value = localStorage.getItem("aisee.token") || "";
$("adminToken").value = localStorage.getItem("aisee.adminToken") || "";

const base = () => $("server").value.trim().replace(/\/+$/, "");
// consumer token for queries/reads; admin token for model management (falls back to the other)
const tokenFor = admin => {
  const c = $("token").value.trim(), a = $("adminToken").value.trim();
  return admin ? (a || c) : (c || a);
};
const headers = (admin = false) => {
  const t = tokenFor(admin);
  return t ? { "Authorization": "Bearer " + t } : {};
};

async function api(path, opts = {}, admin = false) {
  const r = await fetch(base() + path, Object.assign({ headers: headers(admin) }, opts));
  if (!r.ok) {
    let msg = "HTTP " + r.status + ": " + (await r.text()).slice(0, 300);
    if (r.status === 401) msg += " - set a token on the Server tab";
    if (r.status === 403) msg += " - this needs the admin token (Server tab)";
    throw new Error(msg);
  }
  return r.json();
}

async function connect() {
  localStorage.setItem("aisee.server", $("server").value.trim());
  localStorage.setItem("aisee.token", $("token").value.trim());
  localStorage.setItem("aisee.adminToken", $("adminToken").value.trim());
  $("descLink").innerHTML = '<a href="' + base() + '/v1/describe">' + base() + "/v1/describe</a>";
  try {
    const h = await api("/v1/health");
    const models = await api("/v1/models");
    $("ver").textContent = "v" + h.version;
    $("health").textContent = "connected";
    $("apiInfo").textContent = "AISee v" + h.version + " at " + base() + " - " +
      (h.ok ? "healthy" : "unhealthy") + ", " + models.length + " model(s) installed, " +
      models.filter(m => m.state === "running").length + " running";
    const rows = models.map(m =>
      "<tr><td>" + m.slug + (m.default ? " *" : "") + "</td>" +
      '<td class="st-' + m.state + '">' + m.state + (m.loading_note ? " (" + m.loading_note + ")" : "") + "</td>" +
      "<td>" + (m.supports_native_video ? "yes" : "no") + "</td>" +
      "<td>" + (m.idle_timeout || "-") + " s</td>" +
      "<td>" + (m.last_used ? fmtDate(m.last_used) : "never") + "</td>" +
      '<td style="text-align:center"><button data-act="' + (m.state === "running" || m.state === "starting" ? "stop" : "start") +
      '" data-slug="' + m.slug + '">' + (m.state === "running" || m.state === "starting" ? "stop" : "start") + "</button>" +
      '<button style="margin-top:5px;" data-act="remove" data-slug="' + m.slug + '">uninstall</button></td></tr>').join("");
    $("modelsBox").innerHTML = models.length
      ? "<table><tr><th>model</th><th>state</th><th>video</th><th>idle timeout</th><th>last used</th><th>actions</th></tr>" + rows + "</table>"
      : '<div class="muted">no models installed</div>';
    for (const b of document.querySelectorAll("#modelsBox button"))
      b.addEventListener("click", () => modelAction(b.dataset.act, b.dataset.slug));
    loadCatalog(models);
    const sel = $("model");
    const prev = sel.value;
    sel.innerHTML = '<option value="">(default)</option>';
    for (const m of models) {
      const o = document.createElement("option");
      o.value = m.slug;
      o.textContent = m.slug + (m.default ? " *" : "") + " - " + m.state;
      sel.appendChild(o);
    }
    sel.value = prev;
    await refreshTasks(true);
  } catch (e) {
    $("health").textContent = "cannot connect: " + e.message;
    $("apiInfo").textContent = "unreachable";
    $("modelsBox").innerHTML = "";
    $("tasksBox").textContent = "-";
  }
}
$("server").addEventListener("change", connect);
$("token").addEventListener("change", connect);
$("adminToken").addEventListener("change", connect);
$("refresh").addEventListener("click", connect);

// ---------------- model management ----------------

async function loadCatalog(models) {
  try {
    const cat = await api("/v1/catalog");
    const sel = $("installSel");
    const prev = sel.value;
    sel.innerHTML = '<option value="">(pick from catalog)</option>';
    for (const c of cat) {
      const o = document.createElement("option");
      o.value = c.slug;
      o.textContent = c.slug + (c.installed ? " (installed)" : "");
      o.disabled = c.installed;
      sel.appendChild(o);
    }
    sel.value = prev;
  } catch (e) { /* catalog optional */ }
}

async function modelAction(act, slug) {
  if (act === "remove" &&
      !confirm("Uninstall model " + slug + "?\n\nThis stops it and removes it from this server. Downloaded weights stay in the shared cache, so reinstalling is fast.")) return;
  $("modelsMsg").textContent = act + " " + slug + "...";
  try {
    if (act === "start") await api("/v1/models/" + slug + "/start", { method: "POST" }, true);
    else if (act === "stop") await api("/v1/models/" + slug + "/stop", { method: "POST" }, true);
    else if (act === "remove") await api("/v1/models/" + slug, { method: "DELETE" }, true);
    $("modelsMsg").textContent = act + " " + slug + ": ok" +
      (act === "start" ? " (loading can take minutes; Refresh to see progress)" : "");
    await connect();
  } catch (e) { $("modelsMsg").textContent = act + " " + slug + ": " + e.message; }
}

$("installBtn").addEventListener("click", async () => {
  const name = $("installCustom").value.trim() || $("installSel").value;
  if (!name) { $("modelsMsg").textContent = "pick a catalog model or enter an HF id"; return; }
  $("modelsMsg").textContent = "installing " + name + "...";
  try {
    const m = await api("/v1/models", { method: "POST",
      headers: Object.assign({ "Content-Type": "application/json" }, headers(true)),
      body: JSON.stringify({ name }) }, true);
    $("modelsMsg").textContent = "installed " + m.slug +
      " (weights download on first start)";
    $("installCustom").value = "";
    await connect();
  } catch (e) { $("modelsMsg").textContent = "install: " + e.message; }
});

// ---------------- tasks table with inline detail row ----------------

function fillDetail(td, t) {
  const p = t.progress || {};
  let line = "[" + t.status + "] " + (p.detail || p.step || "");
  if (p.chunk && p.chunk.n) line += " (chunk " + p.chunk.i + "/" + p.chunk.n + ")";
  const tm = t.timings || {};
  if (t.status === "done")
    line = "done" + (tm.inference_s ? " - inference " + tm.inference_s + "s" : "") +
           (tm.model_load_s ? ", model load " + tm.model_load_s + "s" : "");
  let body = null, cls = "";
  if (t.status === "failed") { body = ((t.error || {}).message || "unknown error").slice(0, 1000); cls = " fail"; }
  else if (t.status === "done") {
    const r = t.result || {};
    if (t.kind === "look" && typeof r.answer === "string") body = r.answer;
    else { body = JSON.stringify(r, null, 2); if (typeof r.pass === "boolean") cls = r.pass ? " pass" : " fail"; }
  }
  td.innerHTML = '<div class="d-status"></div>' + (body !== null ? '<div class="d-result' + cls + '"></div>' : "");
  td.querySelector(".d-status").textContent = line;
  if (body !== null) td.querySelector(".d-result").textContent = body;
}

function stopPoller(id) {
  if (pollers[id]) { clearInterval(pollers[id]); delete pollers[id]; }
}

async function pollInto(id) {
  const td = document.getElementById("detail-" + id);
  if (!td) { stopPoller(id); return; }
  try {
    const t = await api("/v1/tasks/" + id);
    fillDetail(td, t);
    const st = document.querySelector('#tasksBox tr[data-id="' + id + '"] td.st');
    if (st) { st.textContent = t.status; st.className = "st st-" + t.status; }
    if (TERMINAL.includes(t.status)) stopPoller(id);
  } catch (e) {
    td.innerHTML = '<div class="d-status">error: ' + e.message + "</div>";
    stopPoller(id);
  }
}

function collapse() {
  for (const id of Object.keys(pollers)) stopPoller(id);
  const d = document.querySelector("#tasksBox tr.detail");
  if (d) d.remove();
  const s = document.querySelector("#tasksBox tr.sel");
  if (s) s.className = "";
  expandedId = null;
  localStorage.removeItem("aisee.expanded");
}

function expand(id) {
  collapse();
  const row = document.querySelector('#tasksBox tr[data-id="' + id + '"]');
  if (!row) return;
  row.className = "sel";
  expandedId = id;
  localStorage.setItem("aisee.expanded", id);
  const d = row.insertAdjacentElement("afterend", document.createElement("tr"));
  d.className = "detail";
  const td = document.createElement("td");
  td.colSpan = 5;
  td.id = "detail-" + id;
  td.innerHTML = '<div class="d-status">loading...</div>';
  d.appendChild(td);
  pollInto(id);
  pollers[id] = setInterval(() => pollInto(id), 2000);
}

async function refreshTasks(reattach = false) {
  try {
    const tasks = await api("/v1/tasks?limit=12");
    if (!tasks.length) { $("tasksBox").textContent = "no tasks yet"; return; }
    const rows = tasks.map(t =>
      '<tr data-id="' + t.id + '">' +
      "<td>" + t.id + "</td><td>" + t.kind + "</td><td>" + (t.model || "") + "</td>" +
      '<td class="st st-' + t.status + '">' + t.status + "</td>" +
      "<td>" + fmtDate(t.created) + "</td></tr>").join("");
    $("tasksBox").innerHTML =
      "<table><tr><th>id</th><th>kind</th><th>model</th><th>status</th><th>created</th></tr>" +
      rows + "</table>";
    for (const tr of document.querySelectorAll("#tasksBox tr[data-id]"))
      tr.addEventListener("click", () => tr.dataset.id === expandedId ? collapse() : expand(tr.dataset.id));
    if (reattach) {
      const wanted = expandedId && tasks.find(t => t.id === expandedId) ? expandedId
        : (tasks.find(t => !TERMINAL.includes(t.status)) || {}).id;
      if (wanted) { const keep = wanted; expandedId = null; expand(keep); }
    }
  } catch (e) { $("tasksBox").textContent = "tasks: " + e.message; }
}

// ---------------- submitting queries ----------------

$("kind").addEventListener("change", () => {
  $("promptLabel").textContent = $("kind").value === "assert" ? "expectation" : "question";
});

// fetch() cannot report upload progress, so submissions go through XHR
function uploadTask(fd) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("POST", base() + "/v1/tasks");
    const tok = tokenFor(false);
    if (tok) xhr.setRequestHeader("Authorization", "Bearer " + tok);
    xhr.upload.onprogress = e => {
      if (!e.lengthComputable) return;
      const pct = Math.round(100 * e.loaded / e.total);
      const mb = n => (n / 1048576).toFixed(1);
      $("status").innerHTML = "uploading " + pct + "% (" + mb(e.loaded) + " / " + mb(e.total) +
        " MB)" + '<div class="bar" style="max-width:280px;margin-top:.3rem"><div style="width:' +
        pct + '%"></div></div>';
    };
    xhr.upload.onload = () => { $("status").textContent = "upload complete, waiting for the server..."; };
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) resolve(JSON.parse(xhr.responseText));
      else reject(new Error("HTTP " + xhr.status + ": " + xhr.responseText.slice(0, 300)));
    };
    xhr.onerror = () => reject(new Error("network error during upload"));
    xhr.send(fd);
  });
}

$("go").addEventListener("click", async () => {
  const kind = $("kind").value;
  const files = $("files").files;
  if (!files.length) { $("status").textContent = "pick at least one media file"; return; }
  if (!$("prompt").value.trim()) { $("status").textContent = "enter a " + $("promptLabel").textContent; return; }
  const params = { kind };
  // watch accepts question or expectation; this console submits the prompt as a question
  params[kind === "assert" ? "expectation" : "question"] = $("prompt").value.trim();
  if ($("model").value) params.model = $("model").value;
  if ($("context").value.trim()) params.context = $("context").value.trim();
  if ($("fps").value) params.fps = parseFloat($("fps").value);
  if ($("frames").value) params.frames = parseInt($("frames").value, 10);
  if ($("chunk").value) params.chunk_seconds = parseFloat($("chunk").value);
  if ($("native").checked) params.native = true;

  const fd = new FormData();
  for (const f of files) fd.append("files", f);
  fd.append("params", JSON.stringify(params));

  $("go").disabled = true;
  $("status").textContent = "uploading...";
  try {
    const { id } = await uploadTask(fd);
    $("status").textContent = "submitted task " + id;
    localStorage.setItem("aisee.expanded", id);
    expandedId = id;
    showTab("tasks");                  // jump to the tasks tab with the new task expanded
  } catch (e) { $("status").textContent = "submit error: " + e.message; }
  $("go").disabled = false;
});

showTab(localStorage.getItem("aisee.tab") || "server");
connect();
</script>
</body>
</html>
